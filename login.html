<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morya Solution Login</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to right, #07b3fd, #013f90, #2c5364);
    color: white;
}

.container {
    display: flex;
    height: 100vh;
}

/* LEFT */
.left {
    width: 50%;
    padding: 80px;
}

.left h1 {
    color: #00c6ff;
}

/* RIGHT */
.right {
    width: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 10px;
    width: 320px;
    backdrop-filter: blur(10px);
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: none;
    border-radius: 5px;
}

button {
    width: 100%;
    padding: 10px;
    background: #00c6ff;
    border: none;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #0072ff;
}

/* CAPTCHA */
.captcha-box {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
}

.captcha {
    background: white;
    color: black;
    padding: 8px 15px;
    font-weight: bold;
    letter-spacing: 3px;
    border-radius: 5px;
}

.refresh {
    width: auto;
    padding: 5px 10px;
    margin-left: 10px;
}

</style>
</head>

<body onload="generateCaptcha()">

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <h1>To Continue using Portal</h1>
        <p>Complete Your Registration.</p>

        <h2>बिना रुकावट पोर्टल का उपयोग करते रहें</h2>
        <p>रजिस्टर करो</p>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <div class="login-box">

            <h2>Retailer Login</h2>

            <input type="text" placeholder="Enter Mobile Number">

            <input type="password" placeholder="Enter Password" id="password">

            <label>
                <input type="checkbox" onclick="togglePassword()"> Show Password
            </label>

            <!-- CAPTCHA -->
            <div class="captcha-box">
                <div id="captcha" class="captcha"></div>
                <button class="refresh" onclick="generateCaptcha()">↻</button>
            </div>

            <input type="text" id="captchaInput" placeholder="Enter Captcha">

            <button onclick="validateLogin()">LOGIN</button>

        </div>
    </div>

</div>

<script>

// SHOW PASSWORD
function togglePassword() {
    let pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}

// CAPTCHA
let captchaCode = "";

function generateCaptcha() {
    let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    captchaCode = "";
    for (let i = 0; i < 5; i++) {
        captchaCode += chars[Math.floor(Math.random() * chars.length)];
    }
    document.getElementById("captcha").innerText = captchaCode;
}

// LOGIN VALIDATION
function validateLogin() {
    let userInput = document.getElementById("captchaInput").value;

    if (userInput !== captchaCode) {
        alert("Wrong Captcha ❌");
        generateCaptcha();
        return;
    }

    alert("Login Successful ✅");
    window.location.href = "homepage.html"; // Redirect to dashboard   
}

</script>

</body>
</html>
